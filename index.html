<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calendario WA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Calendario WhatsApp — OtroNodo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* TEMA OSCURO (default) */
:root{
  --bg:#13172a;
  --card:#1e2338;
  --surf:#242938;
  --brd:rgba(255,255,255,0.07);
  --brh:rgba(45,212,176,0.4);
  --text:#ffffff;
  --muted:#6b7280;
  --teal:#2dd4b0;
  --teal-bg:rgba(45,212,176,0.12);
  --teal-dark:#1a3a33;
  --amber:#fbbf24;
  --amber-bg:rgba(251,191,36,0.12);
  --purple:#a78bfa;
  --purple-bg:rgba(167,139,250,0.12);
  --blue:#60a5fa;
  --blue-bg:rgba(96,165,250,0.12);
  --green:#4ade80;
  --green-bg:rgba(74,222,128,0.12);
  --today-bg:rgba(45,212,176,0.1);
  --sel-bg:#1a3a33;
  --sel-brd:var(--teal);
  --dot-e-bg:rgba(45,212,176,0.15);
  --dot-e-c:var(--teal);
  --dot-p-bg:rgba(251,191,36,0.15);
  --dot-p-c:var(--amber);
  --dot-t-bg:rgba(167,139,250,0.15);
  --dot-t-c:var(--purple);
  --ac-bg:var(--card);
  --ac-hover:var(--surf);
  --modal-bg:var(--card);
  --input-bg:var(--surf);
  --toast-bg:var(--card);
}

/* TEMA CLARO */
body.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --surf:#f8fafc;
  --brd:rgba(0,0,0,0.08);
  --brh:rgba(0,0,0,0.2);
  --text:#0f172a;
  --muted:#64748b;
  --teal:#0d9488;
  --teal-bg:rgba(13,148,136,0.08);
  --teal-dark:#f0fdf4;
  --today-bg:rgba(13,148,136,0.08);
  --sel-bg:#eff6ff;
  --sel-brd:#2563eb;
  --dot-e-bg:#dcfce7;
  --dot-e-c:#15803d;
  --dot-p-bg:#fef9c3;
  --dot-p-c:#a16207;
  --dot-t-bg:#ede9fe;
  --dot-t-c:#7c3aed;
  --ac-bg:#ffffff;
  --ac-hover:#f8fafc;
  --modal-bg:#ffffff;
  --input-bg:#f8fafc;
  --toast-bg:#ffffff;
}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}

.top{background:var(--card);border-bottom:1px solid var(--brd);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:99}
.brand{font-size:15px;font-weight:700;color:var(--teal)}
.top-right{display:flex;align-items:center;gap:10px}
.upd{font-size:11px;color:var(--muted)}
.theme-btn{background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;color:var(--text);display:flex;align-items:center;gap:5px;transition:border-color .15s}
.theme-btn:hover{border-color:var(--teal)}

.main{max-width:960px;margin:0 auto;padding:1rem}

.cal{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:1.25rem;margin-bottom:1.25rem}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.ct{font-size:16px;font-weight:700;color:var(--text)}
.cbtns{display:flex;gap:6px;align-items:center}
.nav{background:var(--surf);border:1px solid var(--brd);border-radius:10px;color:var(--text);font-size:18px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s}
.nav:hover{border-color:var(--teal);color:var(--teal)}
.btn-new{background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:8px 16px;cursor:pointer;transition:opacity .15s}
body.light .btn-new{color:#0f172a}
.btn-new:hover{opacity:.85}

.leg{display:flex;gap:12px;margin-bottom:.875rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:50%}

.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dlbl{text-align:center;font-size:10px;color:var(--teal);font-weight:600;padding:3px 0 10px;text-transform:uppercase;letter-spacing:.05em}
body.light .dlbl{color:var(--muted)}

.dc{min-height:72px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:6px;transition:border-color .12s,background .12s}
.dc.hm{cursor:pointer}.dc.hm:hover{border-color:var(--brh)}
.dc.empty{background:transparent;border-color:transparent}
.dc.today{border-color:var(--teal)!important;background:var(--today-bg)!important}
.dc.selected{background:var(--sel-bg)!important;border-color:var(--sel-brd)!important;border-width:2px}
.dn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px}
.dc.today .dn{color:var(--teal)}
.dc.selected .dn{color:var(--sel-brd)}

.dot{font-size:9px;border-radius:4px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.dot.e{background:var(--dot-e-bg);color:var(--dot-e-c)}
.dot.p{background:var(--dot-p-bg);color:var(--dot-p-c)}
.dot.t{background:var(--dot-t-bg);color:var(--dot-t-c)}
.more{font-size:9px;color:var(--muted)}

.panel{background:var(--card);border:1px solid var(--brd);border-radius:16px;overflow:hidden;margin-bottom:1.25rem}
.ph{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd)}
.pt{font-size:13px;font-weight:600;color:var(--text)}
.pc{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.mr{display:flex;gap:10px;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd);align-items:flex-start}
.mr:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;background:var(--teal-bg);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--teal);flex-shrink:0}
.av.t{background:var(--purple-bg);color:var(--purple)}
.mb{flex:1;min-width:0}
.mt{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.mn{font-size:12px;font-weight:600;color:var(--text)}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge.e{background:var(--dot-e-bg);color:var(--dot-e-c)}
.badge.p{background:var(--dot-p-bg);color:var(--dot-p-c)}
.badge.t{background:var(--dot-t-bg);color:var(--dot-t-c)}
.mm{font-size:10px;color:var(--muted);margin-bottom:3px}
.mx{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mxf{font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.5;display:none}
.mas{display:flex;gap:6px;margin-top:4px}
.ba{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.ba:hover{border-color:var(--teal);color:var(--teal)}

.modal-wrap{display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;background:rgba(0,0,0,.6);position:fixed;inset:0;z-index:200;overflow-y:auto}
.modal{background:var(--modal-bg);border:1px solid var(--brd);border-radius:16px;width:100%;max-width:460px;padding:1.5rem}
.modal h3{font-size:14px;font-weight:600;margin-bottom:1rem;color:var(--text)}
.fr{margin-bottom:10px;position:relative}
.fr label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.fr input,.fr textarea{width:100%;background:var(--input-bg);border:1px solid var(--brd);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;outline:none;font-family:inherit}
.fr input:focus,.fr textarea:focus{border-color:var(--teal)}
.fr textarea{resize:vertical;min-height:75px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.bcanc{background:none;border:1px solid var(--brd);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 16px;cursor:pointer}
.bcanc:hover{border-color:var(--brh);color:var(--text)}
.bsave{background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:7px 18px;cursor:pointer}
body.light .bsave{color:#0f172a}
.bsave:disabled{opacity:.4;cursor:not-allowed}

.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--toast-bg);border:1px solid var(--brd);border-radius:10px;padding:12px 18px;font-size:13px;z-index:300;display:none}
.toast.ok{border-color:rgba(45,212,176,.4);color:var(--teal)}
.toast.err{border-color:rgba(248,113,113,.4);color:#f87171}

.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--ac-bg);border:1px solid var(--brd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:100;max-height:200px;overflow-y:auto;display:none;margin-top:2px}
.ac-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--ac-hover)}
.ac-av{width:30px;height:30px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--teal);flex-shrink:0;overflow:hidden}
.ac-av img{width:100%;height:100%;object-fit:cover}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:12px;font-weight:500;color:var(--text)}
.ac-num{font-size:10px;color:var(--muted)}
.ac-loading{padding:10px 12px;font-size:12px;color:var(--muted);text-align:center}
.fn-selected{border-color:var(--teal)!important}

@media(max-width:600px){
  .dc{min-height:62px}
  .fg{grid-template-columns:1fr}
  .dot{font-size:0;padding:3px;width:8px;height:8px;border-radius:50%;margin-bottom:2px;display:inline-block;margin-right:2px;overflow:hidden}
  .dn{font-size:12px}
  .more{font-size:9px}
  .dlbl{font-size:9px}
}
</style>
</head>
<body>
<div class="top">
  <div class="brand">OtroNodo · WhatsApp</div>
  <div class="top-right">
    <div class="upd" id="upd"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Claro</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="cal">
    <div class="ch">
      <div class="ct" id="mlbl"></div>
      <div class="cbtns">
        <button class="nav" onclick="cm(-1)">&#8249;</button>
        <button class="nav" onclick="cm(1)">&#8250;</button>
        <button class="btn-new" onclick="openModal()">+ Nuevo</button>
      </div>
    </div>
    <div class="leg">
      <div class="li"><div class="ld" style="background:var(--dot-e-c)"></div>Enviado</div>
      <div class="li"><div class="ld" style="background:var(--dot-p-c)"></div>Pendiente</div>
      <div class="li"><div class="ld" style="background:var(--dot-t-c)"></div>Tarea</div>
    </div>
    <div class="g7" id="dlbls"></div>
    <div class="g7" id="cgrid"></div>
  </div>
  <div id="panel" style="display:none" class="panel"></div>
</div>

<div class="modal-wrap" id="mwrap">
  <div class="modal">
    <h3>Nuevo mensaje programado</h3>
    <div class="fr">
      <label>Destinatario</label>
      <div class="ac-wrap">
        <input id="fn" placeholder="Escribí el nombre..." autocomplete="off" oninput="buscarContacto(this.value)">
        <div class="ac-drop" id="ac-drop"></div>
      </div>
    </div>
    <div class="fr" id="fnum-wrap">
      <label style="display:flex;align-items:center;justify-content:space-between">
        <span>Número</span>
        <button type="button" id="btn-manual" onclick="activarManual()" style="font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer">Ingresar manualmente</button>
      </label>
      <input id="fnum" placeholder="Se completa al elegir contacto" readonly style="background:var(--surf);color:var(--muted)">
    </div>
    <div class="fr"><label>Mensaje</label><textarea id="fmsg" placeholder="Escribí el mensaje..."></textarea></div>
    <div class="fr"><label>Fecha y hora (Madrid)</label><input type="datetime-local" id="fdt"></div>
    <div class="mact">
      <button class="bcanc" onclick="closeModal()">Cancelar</button>
      <button class="bsave" id="bsv" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://azmurvcoiqbktxmevsga.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6bXVydmNvaXFia3R4bWV2c2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxMzk4MTUsImV4cCI6MjA2MDcxNTgxNX0.ZOK2jmI2v0o16A_qdxe8iy5rn5xATkOboGSC6r6zU2Y';
const db=supabase.createClient(SB_URL,SB_KEY);

let msgs=[],tareas=[],calData=[],cy=new Date().getFullYear(),cmo=new Date().getMonth(),sel=null,exp=new Set();
let acTimer=null;

async function load(){
  const [r1,r2,rv]=await Promise.all([
    db.from('mensajes_programados').select('id,destinatario_nombre,destinatario_numero,mensaje,proximo_envio,activo').order('proximo_envio'),
    db.from('tareas_dinamicas').select('id,nombre,descripcion,destinatario_nombre,destinatario_numero,proximo_envio,activo').order('proximo_envio'),
    db.from('v_calendario').select('*')
  ]);
  if(r1.data) msgs=r1.data;
  if(r2.data) tareas=r2.data;
  if(rv.data) calData=rv.data;
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  renderCal();
  if(sel) sd(sel);
}

function fcd(y,m,d){return calData.filter(x=>x.y===y&&x.m===m&&x.d===d);}
function fd(y,m,d){return msgs.filter(x=>{const dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}
function fdt(y,m,d){return tareas.filter(x=>{const dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}

function renderCal(){
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('mlbl').textContent=MN[cmo]+' '+cy;
  document.getElementById('dlbls').innerHTML=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>'<div class="dlbl">'+d+'</div>').join('');
  const f=new Date(cy,cmo,1).getDay(),off=f===0?6:f-1,dim=new Date(cy,cmo+1,0).getDate(),td=new Date();
  const esHoy=(y,m,d)=>td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===d&&cy===y&&cmo===m;
  let h=Array(off).fill('<div class="dc empty"></div>').join('');
  for(let d=1;d<=dim;d++){
    const it=esHoy(cy,cmo,d);
    const all=fcd(cy,cmo,d);
    const sh=all.slice(0,3),ex=all.length-3;
    let dots=sh.map(x=>{
      const cls=x.tipo==='tarea'?'t':x.a?'p':'e';
      return '<span class="dot '+cls+'">'+x.n.split(' ')[0]+'</span>';
    }).join('');
    if(ex>0) dots+='<div class="more">+'+ex+'</div>';
    h+='<div class="dc'+(it?' today':'')+(all.length?' hm':'')+'" '+(all.length?'onclick="sd('+d+')"':'')+'>'+
       '<div class="dn">'+d+'</div>'+dots+'</div>';
  }
  document.getElementById('cgrid').innerHTML=h;
  if(sel) highlightSel(sel);
}

function highlightSel(d){
  document.querySelectorAll('.dc.selected').forEach(el=>el.classList.remove('selected'));
  const cells=document.querySelectorAll('#cgrid .dc');
  const f=new Date(cy,cmo,1).getDay(),off=f===0?6:f-1;
  const idx=d+off-1;
  if(cells[idx]) cells[idx].classList.add('selected');
}

function sd(d){
  sel=d;
  highlightSel(d);
  const dm=fd(cy,cmo,d),dta=fdt(cy,cmo,d);
  const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const total=dm.length+dta.length;
  const mrows=dm.map(m=>{
    const h=new Date(m.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    const ini=m.destinatario_nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const isE=exp.has(m.id);
    return '<div class="mr"><div class="av">'+ini+'</div><div class="mb">'+
      '<div class="mt"><span class="mn">'+m.destinatario_nombre+'</span><span class="badge '+(m.activo?'p':'e')+'">'+(m.activo?'pendiente':'enviado')+'</span></div>'+
      '<div class="mm">'+h+' Madrid · '+m.destinatario_numero+'</div>'+
      '<div class="mx" id="px-'+m.id+'" style="'+(isE?'display:none':'')+'">'+m.mensaje.replace(/\n/g,' ')+'</div>'+
      '<div class="mxf" id="fx-'+m.id+'" style="'+(isE?'display:block':'display:none')+'">'+m.mensaje+'</div>'+
      '<div class="mas"><button class="ba" onclick="te(\''+m.id+'\')">'+(isE?'Ver menos':'Ver más')+'</button></div>'+
      '</div></div>';
  }).join('');
  const trows=dta.map(t=>{
    const h=new Date(t.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    const ini=(t.destinatario_nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return '<div class="mr"><div class="av t">'+ini+'</div><div class="mb">'+
      '<div class="mt"><span class="mn">'+t.destinatario_nombre+'</span><span class="badge t">tarea</span></div>'+
      '<div class="mm">'+h+' Madrid · '+(t.nombre||'')+'</div>'+
      '<div class="mx">'+(t.descripcion||t.nombre||'').replace(/\n/g,' ')+'</div>'+
      '</div></div>';
  }).join('');
  const panel=document.getElementById('panel');
  panel.style.display='block';
  panel.innerHTML='<div class="ph"><div class="pt">'+d+' '+MS[cmo]+' '+cy+' · '+total+' elemento'+(total!==1?'s':'')+'</div><button class="pc" onclick="cp()">×</button></div>'+mrows+trows;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function te(id){exp.has(id)?exp.delete(id):exp.add(id);if(sel)sd(sel);}
function cp(){sel=null;const p=document.getElementById('panel');p.style.display='none';p.innerHTML='';document.querySelectorAll('.dc.selected').forEach(el=>el.classList.remove('selected'));}
function cm(dir){cmo+=dir;if(cmo>11){cmo=0;cy++;}if(cmo<0){cmo=11;cy--;}sel=null;cp();renderCal();}

async function buscarContacto(q){
  const drop=document.getElementById('ac-drop');
  document.getElementById('fnum').value='';
  document.getElementById('fn').classList.remove('fn-selected');
  if(q.length<2){drop.style.display='none';return;}
  clearTimeout(acTimer);
  acTimer=setTimeout(async()=>{
    drop.style.display='block';
    drop.innerHTML='<div class="ac-loading">Buscando...</div>';
    try{
      const res=await fetch(SB_URL+'/functions/v1/search-contacts',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({query:q})
      });
      const data=await res.json();
      if(!data.length){drop.innerHTML='<div class="ac-loading">Sin resultados</div>';return;}
      drop.innerHTML=data.map(c=>{
        const ini=c.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
        const foto=c.foto?'<img src="'+c.foto+'" onerror="this.style.display=\'none\'">':'';
        return '<div class="ac-item" onclick="seleccionarContacto(\''+c.nombre.replace(/'/g,"\\'")+"','"+c.numero+"')\">" +
          '<div class="ac-av">'+foto+'<span style="'+(c.foto?'display:none':'')+'">'+ini+'</span></div>'+
          '<div class="ac-info"><div class="ac-name">'+c.nombre+'</div><div class="ac-num">+'+c.numero+'</div></div>'+
          '</div>';
      }).join('');
    }catch(e){drop.innerHTML='<div class="ac-loading">Error al buscar</div>';}
  },300);
}

function seleccionarContacto(nombre,numero){
  document.getElementById('fn').value=nombre;
  document.getElementById('fnum').value=numero;
  document.getElementById('fn').classList.add('fn-selected');
  document.getElementById('ac-drop').style.display='none';
  const fnum=document.getElementById('fnum');
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
}

function activarManual(){
  const fn=document.getElementById('fn');
  const fnum=document.getElementById('fnum');
  fn.oninput=null;fn.placeholder='Escribí el nombre completo';fn.classList.remove('fn-selected');
  document.getElementById('ac-drop').style.display='none';
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
  fnum.placeholder='Ej: 5493434512214';fnum.value='';
  fnum.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'');};
  document.getElementById('btn-manual').style.display='none';
  const label=document.querySelector('#fnum-wrap label');
  const btnV=document.createElement('button');
  btnV.type='button';btnV.textContent='Usar buscador';
  btnV.style='font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--brd);background:none;color:var(--teal);cursor:pointer';
  btnV.onclick=()=>resetFormulario();
  label.appendChild(btnV);
}

function resetFormulario(){
  const fn=document.getElementById('fn');
  fn.oninput=function(){buscarContacto(this.value);};
  fn.placeholder='Escribí el nombre...';fn.value='';fn.classList.remove('fn-selected');
  const fnum=document.getElementById('fnum');
  fnum.readOnly=true;fnum.oninput=null;
  fnum.style.background='var(--surf)';fnum.style.color='var(--muted)';
  fnum.placeholder='Se completa al elegir contacto';fnum.value='';
  document.getElementById('btn-manual').style.display='';
  const btnV=document.querySelector('#fnum-wrap label button:last-child');
  if(btnV&&btnV.textContent==='Usar buscador') btnV.remove();
}

function openModal(){
  resetFormulario();
  document.getElementById('fmsg').value='';
  const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  document.getElementById('fdt').value=now.toISOString().slice(0,16);
  document.getElementById('mwrap').style.display='flex';
}
function closeModal(){document.getElementById('mwrap').style.display='none';document.getElementById('ac-drop').style.display='none';}

async function guardar(){
  const n=document.getElementById('fn').value.trim();
  const num=document.getElementById('fnum').value.trim().replace(/\D/g,'');
  const msg=document.getElementById('fmsg').value.trim();
  const dt=document.getElementById('fdt').value;
  if(!n||!num||!msg||!dt){showToast('Completá todos los campos','err');return;}
  const btn=document.getElementById('bsv');btn.disabled=true;btn.textContent='Guardando...';
  const {error}=await db.from('mensajes_programados').insert({
    destinatario_nombre:n,destinatario_numero:num,mensaje:msg,
    cron_expresion:'* * * * *',una_sola_vez:true,
    proximo_envio:new Date(dt).toISOString(),activo:true
  });
  btn.disabled=false;btn.textContent='Guardar';
  if(error){showToast('Error: '+error.message,'err');return;}
  showToast('Mensaje programado!','ok');closeModal();await load();
}

function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.getElementById('ac-drop').style.display='none';});
document.getElementById('mwrap').addEventListener('click',e=>{if(e.target===document.getElementById('mwrap'))closeModal();});

// TEMA
function setTheme(light){
  document.body.classList.toggle('light',light);
  document.getElementById('theme-icon').textContent=light?'🌙':'☀️';
  document.getElementById('theme-label').textContent=light?'Oscuro':'Claro';
  localStorage.setItem('theme',light?'light':'dark');
}
function toggleTheme(){setTheme(!document.body.classList.contains('light'));}
// Restaurar — default oscuro
setTheme(localStorage.getItem('theme')==='light');

load();
setInterval(load,60000);
</script>
