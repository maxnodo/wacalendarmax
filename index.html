<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calendario WA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Calendario WhatsApp — OtroNodo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#13172a;--card:#1e2338;--surf:#242938;--brd:rgba(255,255,255,0.07);--text:#fff;--muted:#6b7280;--teal:#2dd4b0;--teal-bg:rgba(45,212,176,0.12);--amber:#fbbf24;--purple:#a78bfa;--sel-bg:#2dd4b0}
body.light{--bg:#f0f4f8;--card:#fff;--surf:#f8fafc;--brd:rgba(0,0,0,0.07);--text:#0f172a;--muted:#94a3b8;--teal:#0d9488;--teal-bg:rgba(13,148,136,0.08);--amber:#d97706;--purple:#7c3aed;--sel-bg:#0d9488}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.top{background:transparent;padding:10px 1rem;position:sticky;top:0;z-index:99;display:flex;justify-content:center}
.top-pill{background:var(--card);border:1px solid var(--brd);border-radius:30px;padding:7px 16px;display:flex;align-items:center;gap:10px}
.brand{font-size:14px;font-weight:700;color:var(--teal);white-space:nowrap}
.top-sep{width:1px;height:14px;background:var(--brd);flex-shrink:0}
.upd{font-size:11px;color:var(--muted);white-space:nowrap}
.icon-btn{background:none;border:none;border-radius:8px;padding:4px 7px;cursor:pointer;font-size:14px;color:var(--text);display:flex;align-items:center;transition:background .15s}
.icon-btn:hover{background:var(--surf)}
.contacts-btn{background:var(--teal-bg);border:1px solid rgba(45,212,176,0.2);border-radius:8px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--teal);transition:background .15s}
.contacts-btn:hover{background:rgba(45,212,176,0.2)}

.main{max-width:480px;margin:0 auto;padding:.5rem 1rem 2rem}

.cal{background:var(--card);border-radius:20px;padding:1rem 1.25rem;margin-bottom:1rem;position:relative}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.cal-month{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.cal-arrow{font-size:11px;color:var(--muted);transition:transform .2s}
.cal-nav{display:flex;gap:6px;align-items:center}
.nav-btn{width:32px;height:32px;border-radius:10px;background:var(--surf);border:1px solid var(--brd);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--teal);color:var(--teal)}
.today-btn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;background:var(--teal-bg);border:1px solid rgba(45,212,176,0.25);color:var(--teal);cursor:pointer}

.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ws-day{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:14px;cursor:pointer;transition:background .15s}
.ws-day:hover{background:var(--teal-bg)}
.ws-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.ws-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:var(--muted);transition:all .15s}
.ws-day.has-events .ws-num{color:var(--text);font-weight:600}
.ws-day.today .ws-num{color:var(--teal);font-weight:700;border:2px solid var(--teal)}
.ws-day.selected .ws-num{background:var(--sel-bg);color:#fff!important;font-weight:700;border:none}
body.light .ws-day.selected .ws-num{color:#0f172a!important}
.ws-dots{display:flex;gap:2px;justify-content:center;min-height:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%}
.dot.e{background:var(--teal)}.dot.p{background:var(--amber)}.dot.t{background:var(--purple)}

.month-picker{display:none;position:absolute;top:64px;left:12px;right:12px;background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:.875rem;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.month-picker.open{display:block}
.mp-year{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.mp-yr{font-size:14px;font-weight:700;color:var(--text)}
.mp-yr-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:6px}
.mp-yr-btn:hover{color:var(--text);background:var(--surf)}
.mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.mp-mon{padding:7px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);border-radius:8px;cursor:pointer;transition:all .15s}
.mp-mon:hover{background:var(--teal-bg);color:var(--teal)}
.mp-mon.active{background:var(--teal);color:#fff;font-weight:700}
body.light .mp-mon.active{color:#0f172a}

.btn-new{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:opacity .15s;margin-bottom:1rem;display:block}
body.light .btn-new{color:#0f172a}
.btn-new:hover{opacity:.85}

.tl-wrap{background:var(--card);border-radius:20px;overflow:hidden;margin-bottom:1rem}
.tl-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd)}
.tl-title{font-size:13px;font-weight:600;color:var(--text)}
.tl-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.tl-close:hover{background:var(--surf)}
.tl-body{padding:.75rem 1rem 1rem;overflow:hidden}
.tl-empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}
.tl-slot{display:flex;gap:10px;min-height:56px;position:relative;min-width:0}
.tl-hour{width:42px;flex-shrink:0;font-size:10px;font-weight:600;color:var(--muted);padding-top:4px;text-align:right;white-space:nowrap}
.tl-line-col{width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--brd);border:2px solid var(--brd);flex-shrink:0;margin-top:6px;z-index:1;transition:all .2s}
.tl-slot.has-msg .tl-dot{background:var(--teal);border-color:var(--teal)}
.tl-line{flex:1;width:2px;background:var(--brd)}
.tl-slot:last-child .tl-line{display:none}
.tl-content{flex:1;padding-bottom:.75rem;min-width:0;overflow:hidden}
.tl-slot.now-slot .tl-dot{background:#f87171;border-color:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.2)}
.tl-slot.now-slot .tl-hour{color:#f87171}
.tl-gap{display:flex;justify-content:center;padding:.375rem 0;margin:.125rem 0}
.tl-gap-label{font-size:10px;font-weight:600;color:var(--teal);padding:4px 14px;border-radius:20px;background:var(--teal-bg);border:1px solid rgba(45,212,176,0.2);letter-spacing:.03em}
.tl-card{border-radius:14px;padding:.75rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:transform .1s;position:relative;overflow:hidden;width:100%}
.tl-card:hover{transform:translateY(-1px)}
.tl-card-name{font-size:14px;font-weight:700;color:#1a1f2e;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-card-msg{font-size:11px;color:rgba(26,31,46,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.tl-card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.tl-card-time{font-size:10px;font-weight:600;color:rgba(26,31,46,.5);display:flex;align-items:center;gap:4px}
.tl-card-actions{display:flex;gap:5px;flex-shrink:0}
.tl-card-btn{font-size:9px;padding:2px 8px;border-radius:6px;border:1px solid rgba(0,0,0,.15);background:rgba(0,0,0,.06);color:rgba(26,31,46,.6);cursor:pointer;transition:all .15s;white-space:nowrap}
.tl-card-btn:hover{background:rgba(0,0,0,.12);color:#1a1f2e}
.tl-card-btn.del:hover{border-color:rgba(220,38,38,.4);background:rgba(220,38,38,.1);color:#dc2626}
.tl-card-exp{display:none;font-size:11px;color:rgba(26,31,46,.7);margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,.1);white-space:pre-wrap;line-height:1.5;word-break:break-word}
.tl-card-img{width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:6px;display:block}
.tl-card.sent{opacity:.65}
.tc-purple{background:#D4C5F0}.tc-blue{background:#BED3F0}.tc-green{background:#C2E0CA}
.tc-peach{background:#F0D0C0}.tc-sand{background:#EDE0C4}.tc-sky{background:#C0DAE8}

/* AGENDA */
.agenda-wrap{background:var(--card);border-radius:20px;overflow:hidden;margin-bottom:1rem}
.ag-head{background:var(--surf);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.ag-title{font-size:14px;font-weight:700;color:var(--text)}
.ag-sub{font-size:10px;color:var(--muted);margin-top:1px}
.ag-back{font-size:12px;cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:8px;transition:background .15s;color:var(--muted)}
.ag-back:hover{background:var(--brd)}
.ag-search{margin:10px 12px 6px;background:var(--surf);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;border:1px solid var(--brd)}
.ag-search input{background:none;border:none;outline:none;font-size:11px;color:var(--text);width:100%;font-family:inherit}
.ag-search input::placeholder{color:var(--muted)}

/* FAVORITOS SCROLL */
.ag-favs-section{border-bottom:1px solid var(--brd);padding-bottom:8px}
.ag-favs-label{font-size:9px;font-weight:700;color:var(--teal);padding:10px 16px 8px;text-transform:uppercase;letter-spacing:.08em}
.ag-favs-row{display:flex;gap:14px;padding:0 16px 4px;overflow-x:auto}
.ag-favs-row::-webkit-scrollbar{display:none}
.fav-bubble{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.fav-av-wrap{position:relative}
.fav-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:transform .1s}
.fav-bubble:hover .fav-av{transform:scale(1.05)}
.fav-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--teal);border:2px solid var(--card)}
.fav-name{font-size:9px;color:var(--muted);text-align:center;max-width:52px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-pend{position:absolute;top:-2px;right:-2px;background:var(--amber);color:#000;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}

/* LISTA TODOS */
.ag-divider{height:1px;background:var(--brd);margin:0}
.ag-all-label{font-size:9px;font-weight:700;color:var(--muted);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:.08em}
.ag-sec{font-size:9px;font-weight:700;color:var(--teal);padding:5px 16px 2px;letter-spacing:.08em;text-transform:uppercase}
.ag-row{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .1s}
.ag-row:hover{background:var(--surf)}
.ag-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ag-info{flex:1;min-width:0}
.ag-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-num{font-size:10px;color:var(--muted)}
.ag-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ag-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;background:rgba(251,191,36,0.12);color:var(--amber)}
.ag-star{font-size:13px;cursor:pointer;border:none;background:none;padding:0;transition:transform .1s;line-height:1}
.ag-star:hover{transform:scale(1.2)}
.ag-div{height:1px;background:var(--brd);margin:0 16px}
.ag-empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}
.ag-fab{margin:10px 12px 12px;background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:12px;font-weight:700;padding:10px;cursor:pointer;width:calc(100% - 24px);display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
body.light .ag-fab{color:#0f172a}
.ag-fab:hover{opacity:.85}

/* TABS — ahora solo para filtrar la lista */
.ag-tabs{display:flex;gap:6px;padding:4px 12px 8px}
.ag-tab{font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid transparent;background:none;color:var(--muted);transition:all .15s}
.ag-tab.active{background:var(--teal-bg);color:var(--teal);border-color:rgba(45,212,176,0.2)}

/* MODALES */
.modal-wrap{display:none;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;background:rgba(0,0,0,.65);position:fixed;inset:0;z-index:200;overflow-y:auto}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:440px;padding:1.5rem}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.fr{margin-bottom:12px;position:relative}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fr input,.fr textarea{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--text);font-size:13px;padding:10px 14px;outline:none;font-family:inherit;transition:border-color .15s}
.fr input:focus,.fr textarea:focus{border-color:var(--teal)}
.fr textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--muted);font-size:13px;padding:10px 18px;cursor:pointer}
.btn-save{background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer}
body.light .btn-save{color:#0f172a}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

.attach-zone{border:2px dashed var(--brd);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
.attach-zone:hover{border-color:var(--teal)}
.attach-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.az-icon{font-size:22px;margin-bottom:3px}.az-label{font-size:12px;color:var(--muted)}.az-types{font-size:10px;color:var(--muted);margin-top:2px;opacity:.7}
.attach-preview{display:none;border-radius:12px;overflow:hidden;border:1px solid var(--brd);margin-top:6px}
.attach-preview img{width:100%;max-height:130px;object-fit:cover;display:block}
.ap-info{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--surf)}
.ap-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ap-size{font-size:10px;color:var(--muted)}
.ap-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.attach-prog{display:none;margin-top:6px}
.ap-bar{height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.ap-fill{height:100%;background:var(--teal);width:0%;transition:width .2s;border-radius:2px}
.ap-text{font-size:10px;color:var(--muted);text-align:center;margin-top:3px}

.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--brd);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:100;max-height:220px;overflow-y:auto;display:none;margin-top:4px}
.ac-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--surf)}
.ac-av{width:32px;height:32px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--teal);flex-shrink:0;overflow:hidden}
.ac-av img{width:100%;height:100%;object-fit:cover}
.ac-name{font-size:12px;font-weight:600;color:var(--text)}
.ac-num{font-size:10px;color:var(--muted)}
.ac-empty{padding:12px 14px;font-size:12px;color:var(--muted);text-align:center}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px 20px;font-size:13px;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.ok{border-color:rgba(45,212,176,.4);color:var(--teal)}
.toast.err{border-color:rgba(248,113,113,.4);color:#f87171}
</style>
</head>
<body>

<div class="top">
  <div class="top-pill">
    <span class="brand">OtroNodo</span>
    <div class="top-sep"></div>
    <span class="upd" id="upd">--:--</span>
    <div class="top-sep"></div>
    <button class="contacts-btn" onclick="openAgenda()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
      Contactos
    </button>
    <div class="top-sep"></div>
    <button class="icon-btn" onclick="activarNotifs()" id="notif-btn">🔔</button>
    <button class="icon-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span></button>
  </div>
</div>

<div class="main">
  <!-- CALENDARIO -->
  <div class="cal" id="cal-widget">
    <div class="cal-header">
      <div class="cal-month" onclick="toggleMonthPicker()">
        <span id="mlbl-text">Cargando...</span>
        <span class="cal-arrow" id="mp-arrow">▾</span>
      </div>
      <div class="cal-nav">
        <button class="today-btn" onclick="goToday()">Hoy</button>
        <button class="nav-btn" onclick="cw(-1)">&#8249;</button>
        <button class="nav-btn" onclick="cw(1)">&#8250;</button>
      </div>
    </div>
    <div class="week-strip" id="week-strip"></div>
    <div class="month-picker" id="month-picker">
      <div class="mp-year">
        <button class="mp-yr-btn" onclick="changeYear(-1)">&#8249;</button>
        <span class="mp-yr" id="mp-yr"></span>
        <button class="mp-yr-btn" onclick="changeYear(1)">&#8250;</button>
      </div>
      <div class="mp-grid" id="mp-grid"></div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div id="tl-wrap" style="display:none" class="tl-wrap"></div>

  <!-- AGENDA CONTACTOS -->
  <div id="agenda-view" style="display:none">
    <div class="agenda-wrap">
      <div class="ag-head">
        <div>
          <div class="ag-title">Contactos</div>
          <div class="ag-sub" id="ag-sub">Cargando...</div>
        </div>
        <button class="ag-back" onclick="closeAgenda()">← Volver</button>
      </div>
      <div class="ag-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;color:var(--muted)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="ag-q" placeholder="Buscar por nombre o número..." oninput="filtrarAg(this.value)">
      </div>
      <div class="ag-tabs">
        <button class="ag-tab active" onclick="setTab(this,'todos')">Todos</button>
        <button class="ag-tab" onclick="setTab(this,'favs')">★ Favoritos</button>
        <button class="ag-tab" onclick="setTab(this,'pending')">⏱ Con pendientes</button>
      </div>
      <!-- FAVORITOS SCROLL HORIZONTAL -->
      <div class="ag-favs-section" id="ag-favs-section" style="display:none">
        <div class="ag-favs-label">Favoritos</div>
        <div class="ag-favs-row" id="ag-favs-row"></div>
        <div class="ag-divider"></div>
        <div class="ag-all-label">Todos</div>
      </div>
      <div id="ag-list"></div>
      <button class="ag-fab" onclick="openMC()">+ Nuevo contacto</button>
    </div>
  </div>

  <!-- BOTÓN NUEVO MENSAJE -->
  <button class="btn-new" id="btn-new" onclick="openModal()">+ Nuevo mensaje</button>
</div>

<!-- MODAL MENSAJE -->

function hsh(str){var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return Math.abs(h);}
function getMon(date){var d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}

// WEEK STRIP
function renderWeek(){

    var y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
    var isTod=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
    var isSel=sel&&sel.getFullYear()===y&&sel.getMonth()===m&&sel.getDate()===day;

    var dots=tipos.map(function(t){return '<div class="dot '+t+'"></div>';}).join('');
    var cls='ws-day'+(items.length?' has-events':'')+(isTod?' today':'')+(isSel?' selected':'');
    html+='<div class="'+cls+'" onclick="sd(new Date('+y+','+m+','+day+'))">'
      +'<div class="ws-label">'+WD[d.getDay()]+'</div>'

      +'<div class="ws-dots">'+dots+'</div>'

}

// TIMELINE
function sd(dateObj){

function renderTimeline(dateObj){
  var y=dateObj.getFullYear(),m=dateObj.getMonth(),d=dateObj.getDate();
  var dm=fd(y,m,d),dta=fdt(y,m,d);
  var all=dm.map(function(x){return Object.assign({},x,{_t:'msg'});}).concat(dta.map(function(x){return Object.assign({},x,{_t:'tarea'});}));
  all.sort(function(a,b){return new Date(a.proximo_envio)-new Date(b.proximo_envio);});
  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var wrap=document.getElementById('tl-wrap');
  wrap.style.display='block';
  var now=new Date(),isToday=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
  if(!all.length){
    wrap.innerHTML='<div class="tl-header"><div class="tl-title">'+d+' '+MS[m]+'</div><button class="tl-close" onclick="cp()">×</button></div><div class="tl-empty">Sin mensajes este día</div>';
    return;
  }
  var byH={};
  all.forEach(function(x){
    var hS=new Date(x.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    var hN=parseInt(hS.split(':')[0]);
    if(!byH[hN]) byH[hN]=[];
    byH[hN].push(x);
  });
  var slots=Object.keys(byH).map(Number).sort(function(a,b){return a-b;});
  if(isToday&&slots.indexOf(now.getHours())<0) slots.push(now.getHours());
  slots.sort(function(a,b){return a-b;});
  var html='';
  for(var si=0;si<slots.length;si++){
    var h=slots[si];
    if(si>0&&h-slots[si-1]>1) html+='<div class="tl-gap"><div class="tl-gap-label">+'+(h-slots[si-1]-1)+'h</div></div>';
    var hL=(h<10?'0':'')+h+':00';
    var hasM=!!byH[h],isN=isToday&&now.getHours()===h;
    var cls='tl-slot'+(hasM?' has-msg':'')+(isN?' now-slot':'');
    var cards='';
    if(byH[h]) byH[h].forEach(function(x){
      var hS=new Date(x.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
      var cc=cardColor(x.destinatario_numero||x.destinatario_nombre);
      var isSent=x._t==='msg'&&!x.activo;
      var isE=exp.has(x.id);
      var icon=x._t==='tarea'?'🔄':(x.activo?'⏱':'✓');
      var url=imgUrl(x.mensaje||'');
      var txt=x._t==='tarea'?(x.descripcion||x.nombre||''):(x.mensaje||'');
      if(url) txt=txt.replace(url,'').trim();
      cards+='<div class="tl-card '+cc+(isSent?' sent':'')+'" id="tc-'+x.id+'">'
        +'<div class="tl-card-name">'+x.destinatario_nombre+'</div>'
        +(txt?'<div class="tl-card-msg">'+txt.replace(/\n/g,' ')+'</div>':'')
        +'<div class="tl-card-footer"><div class="tl-card-time">'+icon+' '+hS+'</div>'
        +'<div class="tl-card-actions"><button class="tl-card-btn" onclick="toggleCard(\''+x.id+'\')">'+(isE?'− menos':'+ más')+'</button>'
        +(x._t==='msg'&&x.activo?'<button class="tl-card-btn del" onclick="eliminar(\''+x.id+'\',\''+x.destinatario_nombre.replace(/'/g,'&#39;')+'\',event)">🗑</button>':'')
        +'</div></div>'
        +'<div class="tl-card-exp" id="tce-'+x.id+'" style="display:'+(isE?'block':'none')+';">'
        +(url?'<img class="tl-card-img" src="'+url+'" onerror="this.style.display=\'none\'">':'')+txt+'</div></div>';
    });
    html+='<div class="'+cls+'"><div class="tl-hour">'+hL+'</div><div class="tl-line-col"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-content">'+cards+'</div></div>';
  }
  wrap.innerHTML='<div class="tl-header"><div class="tl-title">'+d+' '+MS[m]+' · '+all.length+' mensaje'+(all.length!==1?'s':'')+'</div><button class="tl-close" onclick="cp()">×</button></div><div class="tl-body">'+html+'</div>';
}

function renderAgenda(){

        +'</div></div>';
      if(i<groups[l].length-1) html+='<div class="ag-div"></div>';
    });
  });
  document.getElementById('ag-list').innerHTML=html;
}

// AUTOCOMPLETE MENSAJES
async function buscarContacto(q){
  var drop=document.getElementById('ac-drop');
  document.getElementById('fnum').value='';
  if(q.length<2){drop.style.display='none';return;}
  clearTimeout(acTimer);
  acTimer=setTimeout(async function(){
    drop.style.display='block';
    drop.innerHTML='<div class="ac-empty">Buscando...</div>';
    try{
      // Buscar primero en agenda propia
      var locales=contactos.filter(function(c){return c.nombre.toLowerCase().includes(q.toLowerCase())||c.numero.includes(q);});
      var res=await fetch(SB_URL+'/functions/v1/search-contacts',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({query:q})});
      var remote=await res.json();
      // Combinar sin duplicados por número
      var nums={};locales.forEach(function(c){nums[c.numero]=1;});
      var extras=remote.filter(function(c){return !nums[c.numero];});
      var todos=locales.map(function(c){return {nombre:c.nombre,numero:c.numero,foto:null,local:true};})
        .concat(extras.map(function(c){return {nombre:c.nombre,numero:c.numero,foto:c.foto,local:false};}));
      if(!todos.length){drop.innerHTML='<div class="ac-empty">Sin resultados</div>';return;}
      drop.innerHTML=todos.map(function(c){
        var ini=c.nombre.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
        var foto=c.foto?'<img src="'+c.foto+'" onerror="this.style.display=\'none\'">':'';
        var tag=c.local?'<span style="font-size:9px;color:var(--teal)">★</span>':'';
        return '<div class="ac-item" onclick="selContact(\''+c.nombre.replace(/'/g,'&#39;')+"','"+c.numero+"')\"><div class=\"ac-av\">"+foto+'<span style="'+(c.foto?'display:none':'')+'">'+ini+'</span></div><div style="flex:1"><div class="ac-name">'+c.nombre+' '+tag+'</div><div class="ac-num">+'+c.numero+'</div></div></div>';
      }).join('');
    }catch(e){drop.innerHTML='<div class="ac-empty">Error al buscar</div>';}
  },300);
}

  document.getElementById('btn-manual').style.display='';
  var btn=document.querySelector('#fnum-wrap label button:last-child');
  if(btn&&btn.textContent==='Buscador') btn.remove();
}

// ADJUNTO
var selFile=null;
function onFileSelect(input){
  var file=input.files[0];if(!file)return;selFile=file;
  var img=document.getElementById('ap-img');
  document.getElementById('ap-name').textContent=file.name;
  document.getElementById('ap-size').textContent=fmtSz(file.size);
  if(file.type.startsWith('image/')){var r=new FileReader();r.onload=function(e){img.src=e.target.result;img.style.display='block';};r.readAsDataURL(file);}
  else img.style.display='none';
  document.getElementById('attach-preview').style.display='block';
  document.getElementById('attach-zone').style.display='none';
}
function removeFile(){selFile=null;document.getElementById('ffile').value='';document.getElementById('attach-preview').style.display='none';document.getElementById('attach-zone').style.display='block';document.getElementById('attach-prog').style.display='none';document.getElementById('ap-fill').style.width='0%';}
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
async function uploadFile(){
  var prog=document.getElementById('attach-prog'),fill=document.getElementById('ap-fill'),txt=document.getElementById('ap-text');
  prog.style.display='block';fill.style.width='20%';txt.textContent='Subiendo...';
  var fd=new FormData();fd.append('file',selFile,selFile.name);fill.style.width='50%';
  var res=await fetch(SB_URL+'/functions/v1/upload-media',{method:'POST',headers:{'Authorization':'Bearer '+SB_KEY},body:fd});
  var data=await res.json();if(!data.ok) throw new Error(data.error||'Error al subir');
  fill.style.width='100%';txt.textContent='✓ Subido';return data.url;
}

function openModal(){
  resetForm();removeFile();document.getElementById('fmsg').value='';
  var now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  var ns=now.toISOString().slice(0,16);
  document.getElementById('fdt').value=ns;document.getElementById('fdt').min=ns;
  document.getElementById('mwrap').style.display='flex';
}
function closeModal(){document.getElementById('mwrap').style.display='none';document.getElementById('ac-drop').style.display='none';}

async function guardar(){
  var n=document.getElementById('fn').value.trim();
  var num=document.getElementById('fnum').value.trim().replace(/\D/g,'');
  var msg=document.getElementById('fmsg').value.trim();
  var dt=document.getElementById('fdt').value;
  if(!n||!num||!dt){showToast('Completá destinatario, número y fecha','err');return;}
  if(new Date(dt)<new Date()){showToast('No podés agendar en el pasado','err');return;}
  if(!msg&&!selFile){showToast('Escribí un mensaje o adjuntá un archivo','err');return;}
  var btn=document.getElementById('bsv');btn.disabled=true;btn.textContent='Guardando...';
  try{
    var finalMsg=msg;
    if(selFile){btn.textContent='Subiendo...';var url=await uploadFile();finalMsg=msg?(msg+'\n'+url):url;}
    var res=await db.from('mensajes_programados').insert({destinatario_nombre:n,destinatario_numero:num,mensaje:finalMsg,cron_expresion:'* * * * *',una_sola_vez:true,proximo_envio:new Date(dt).toISOString(),activo:true});
    if(res.error) throw res.error;
    showToast('Mensaje programado!','ok');closeModal();await load();
  }catch(e){showToast('Error: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Guardar';
}

function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}

document.addEventListener('click',function(e){
  if(!e.target.closest('.ac-wrap')) document.getElementById('ac-drop').style.display='none';
  if(mpOpen&&!e.target.closest('.cal')){mpOpen=false;document.getElementById('month-picker').classList.remove('open');document.getElementById('mp-arrow').style.transform='';}
});
document.getElementById('mwrap').addEventListener('click',function(e){if(e.target===document.getElementById('mwrap'))closeModal();});
document.getElementById('mc-wrap').addEventListener('click',function(e){if(e.target===document.getElementById('mc-wrap'))closeMC();});

function setTheme(light){document.body.classList.toggle('light',light);document.getElementById('theme-icon').textContent=light?'🌙':'☀️';localStorage.setItem('theme',light?'light':'dark');}
function toggleTheme(){setTheme(!document.body.classList.contains('light'));}
setTheme(localStorage.getItem('theme')==='light');

function b64A(s){var b64=s.replace(/-/g,'+').replace(/_/g,'/');var pad='='.repeat((4-b64.length%4)%4);return Uint8Array.from(atob(b64+pad),function(c){return c.charCodeAt(0);});}
async function activarNotifs(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('Browser no soportado','err');return;}
  var perm=await Notification.requestPermission();if(perm!=='granted'){showToast('Permiso denegado','err');return;}
  try{
    var reg=await navigator.serviceWorker.register('/sw.js',{scope:'/'});
    await Promise.race([navigator.serviceWorker.ready,new Promise(function(_,r){setTimeout(function(){r(new Error('timeout'));},5000);})]);
    var sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64A(VAPID)});
    var j=sub.toJSON();if(!j.keys) throw new Error('Sin claves');
    var res=await db.from('push_subscriptions').upsert({endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,user_agent:navigator.userAgent.slice(0,200),activo:true},{onConflict:'endpoint'});
    if(res.error) throw new Error(res.error.message);
    document.getElementById('notif-btn').style.color='var(--teal)';showToast('Notificaciones activadas!','ok');
  }catch(e){showToast('Error: '+e.message,'err');}
}
async function verificarNotifs(){
  if(!('serviceWorker' in navigator)) return;
  var reg=await navigator.serviceWorker.getRegistration('/sw.js').catch(function(){return null;});if(!reg) return;
  var sub=await reg.pushManager.getSubscription().catch(function(){return null;});
  if(sub) document.getElementById('notif-btn').style.color='var(--teal)';
}

renderWeek();
load();
setInterval(load,60000);
verificarNotifs();
</script>
