<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calendario WA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Calendario WhatsApp — OtroNodo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#13172a;
  --card:#1e2338;
  --surf:#242938;
  --brd:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:#6b7280;
  --teal:#2dd4b0;
  --teal-solid:#2dd4b0;
  --teal-bg:rgba(45,212,176,0.15);
  --amber:#fbbf24;
  --purple:#a78bfa;
  --sel-bg:#2dd4b0;
  --today-ring:var(--teal);
}

body.light{
  --bg:#f0f4f8;
  --card:#ffffff;
  --surf:#f8fafc;
  --brd:rgba(0,0,0,0.07);
  --text:#0f172a;
  --muted:#94a3b8;
  --teal:#0d9488;
  --sel-bg:#0d9488;
  --today-ring:#0d9488;
  --teal-bg:rgba(13,148,136,0.1);
  --amber:#d97706;
  --purple:#7c3aed;
}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s}

/* TOPBAR */
.top{background:var(--card);border-bottom:1px solid var(--brd);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:99}
.brand{font-size:15px;font-weight:700;color:var(--teal)}
.top-right{display:flex;align-items:center;gap:8px}
.upd{font-size:11px;color:var(--muted)}
.icon-btn{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:4px;transition:border-color .15s}
.icon-btn:hover{border-color:var(--teal)}
.icon-btn span{font-size:11px;color:var(--muted)}

.main{max-width:480px;margin:0 auto;padding:1.25rem 1rem}

/* CALENDARIO */
.cal{background:var(--card);border-radius:20px;padding:1.25rem;margin-bottom:1rem}

/* Header mes */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-month{font-size:18px;font-weight:700;color:var(--text)}
.cal-nav{display:flex;gap:8px}
.nav-btn{width:36px;height:36px;border-radius:10px;background:var(--surf);border:1px solid var(--brd);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--teal);color:var(--teal)}

/* Días de semana */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:.5rem}
.wday{text-align:center;font-size:12px;font-weight:600;color:var(--teal);padding:4px 0;text-transform:uppercase;letter-spacing:.03em}
body.light .wday{color:var(--muted)}

/* Grid de días */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;transition:all .15s;font-size:15px;font-weight:500;color:var(--muted)}
.day.active{color:var(--text)}
.day.active:hover{background:var(--teal-bg)}
.day.empty{pointer-events:none}
.day.today{color:var(--teal);font-weight:700}
.day.today::before{content:'';position:absolute;inset:0;border-radius:12px;border:2px solid var(--teal)}
.day.selected{background:var(--sel-bg)!important;color:#fff!important;font-weight:700;border-radius:12px}
.day.selected .dot-row .dot{background:rgba(255,255,255,0.6)!important}

/* Dot indicator */
.dot-row{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:3px}
.dot{width:5px;height:5px;border-radius:50%}
.dot.e{background:var(--teal)}
.dot.p{background:var(--amber)}
.dot.t{background:var(--purple)}

/* PANEL detalle */
.panel{background:var(--card);border-radius:20px;overflow:hidden;margin-bottom:1rem}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd)}
.panel-title{font-size:13px;font-weight:600;color:var(--text)}
.panel-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.panel-close:hover{background:var(--surf)}

.msg-row{display:flex;gap:12px;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd);align-items:flex-start}
.msg-row:last-child{border-bottom:none}
.av{width:38px;height:38px;border-radius:50%;background:var(--teal-bg);border:1px solid rgba(45,212,176,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--teal);flex-shrink:0}
body.light .av{border-color:rgba(13,148,136,0.2)}
.av.t{background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.2);color:var(--purple)}
.msg-body{flex:1;min-width:0}
.msg-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600;color:var(--text)}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge.e{background:rgba(45,212,176,0.12);color:var(--teal)}
.badge.p{background:rgba(251,191,36,0.12);color:var(--amber)}
.badge.t{background:rgba(167,139,250,0.12);color:var(--purple)}
body.light .badge.p{background:rgba(217,119,6,0.1);color:var(--amber)}
.msg-time{font-size:10px;color:var(--muted);margin-bottom:3px}
.msg-text{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-textf{font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.5;display:none}
.msg-actions{display:flex;gap:6px;margin-top:5px}
.act-btn{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.act-btn:hover{border-color:var(--teal);color:var(--teal)}

/* BOTÓN NUEVO */
.btn-new{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:opacity .15s;margin-bottom:1rem}
body.light .btn-new{color:#0f172a}
.btn-new:hover{opacity:.85}

/* MODAL */
.modal-wrap{display:none;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;background:rgba(0,0,0,.65);position:fixed;inset:0;z-index:200;overflow-y:auto}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:440px;padding:1.5rem}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.fr{margin-bottom:12px;position:relative}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fr input,.fr textarea{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--text);font-size:13px;padding:10px 14px;outline:none;font-family:inherit;transition:border-color .15s}
.fr input:focus,.fr textarea:focus{border-color:var(--teal)}
.fr textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--muted);font-size:13px;padding:10px 18px;cursor:pointer}
.btn-save{background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer}
body.light .btn-save{color:#0f172a}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--brd);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:100;max-height:220px;overflow-y:auto;display:none;margin-top:4px}
.ac-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--surf)}
.ac-av{width:32px;height:32px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--teal);flex-shrink:0;overflow:hidden}
.ac-av img{width:100%;height:100%;object-fit:cover}
.ac-name{font-size:12px;font-weight:600;color:var(--text)}
.ac-num{font-size:10px;color:var(--muted)}
.ac-empty{padding:12px 14px;font-size:12px;color:var(--muted);text-align:center}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px 20px;font-size:13px;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.ok{border-color:rgba(45,212,176,.4);color:var(--teal)}
.toast.err{border-color:rgba(248,113,113,.4);color:#f87171}

@media(max-width:400px){.day{font-size:13px}.cal{padding:1rem .75rem}}
</style>
</head>
<body>
<div class="top">
  <div class="brand">OtroNodo · WhatsApp</div>
  <div class="top-right">
    <div class="upd" id="upd"></div>
    <button class="icon-btn" onclick="activarNotifs()" id="notif-btn">🔔</button>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">
      <span id="theme-icon">☀️</span><span id="theme-label">Claro</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="cal">
    <div class="cal-header">
      <div class="cal-month" id="mlbl"></div>
      <div class="cal-nav">
        <button class="nav-btn" onclick="cm(-1)">&#8249;</button>
        <button class="nav-btn" onclick="cm(1)">&#8250;</button>
      </div>
    </div>
    <div class="weekdays" id="weekdays"></div>
    <div class="days-grid" id="cgrid"></div>
  </div>

  <button class="btn-new" onclick="openModal()">+ Nuevo mensaje</button>

  <div id="panel" style="display:none" class="panel"></div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="mwrap">
  <div class="modal">
    <div class="modal-title">Nuevo mensaje programado</div>
    <div class="fr">
      <label>Destinatario</label>
      <div class="ac-wrap">
        <input id="fn" placeholder="Escribí el nombre..." autocomplete="off" oninput="buscarContacto(this.value)">
        <div class="ac-drop" id="ac-drop"></div>
      </div>
    </div>
    <div class="fr" id="fnum-wrap">
      <label style="display:flex;align-items:center;justify-content:space-between">
        <span>Número</span>
        <button type="button" id="btn-manual" onclick="activarManual()" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer">Manual</button>
      </label>
      <input id="fnum" placeholder="Se completa automáticamente" readonly style="background:var(--surf);color:var(--muted)">
    </div>
    <div class="fr"><label>Mensaje</label><textarea id="fmsg" placeholder="Escribí el mensaje..."></textarea></div>
    <div class="fr"><label>Fecha y hora (Madrid)</label><input type="datetime-local" id="fdt"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="bsv" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://azmurvcoiqbktxmevsga.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6bXVydmNvaXFia3R4bWV2c2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxMzk4MTUsImV4cCI6MjA2MDcxNTgxNX0.ZOK2jmI2v0o16A_qdxe8iy5rn5xATkOboGSC6r6zU2Y';
const VAPID_KEY='BG4ENwYYyhvwV2Gy7DJQr16aYLmBvlzRxoxez1lbxO0Jd7_JLNx1aCxmRJ2eLCEZWMhR3ZTkHZ7UwXIOyfRUP1U';
const db=supabase.createClient(SB_URL,SB_KEY);

let msgs=[],tareas=[],calData=[],cy=new Date().getFullYear(),cmo=new Date().getMonth(),sel=null,exp=new Set(),acTimer=null;

async function load(){
  const [r1,r2,rv]=await Promise.all([
    db.from('mensajes_programados').select('id,destinatario_nombre,destinatario_numero,mensaje,proximo_envio,activo').order('proximo_envio'),
    db.from('tareas_dinamicas').select('id,nombre,descripcion,destinatario_nombre,destinatario_numero,proximo_envio,activo').order('proximo_envio'),
    db.from('v_calendario').select('*')
  ]);
  if(r1.data) msgs=r1.data;
  if(r2.data) tareas=r2.data;
  if(rv.data) calData=rv.data;
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  renderCal();
  if(sel) sd(sel);
}

function fcd(y,m,d){return calData.filter(x=>x.y===y&&x.m===m&&x.d===d);}
function fd(y,m,d){return msgs.filter(x=>{const dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}
function fdt(y,m,d){return tareas.filter(x=>{const dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}

function renderCal(){
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('mlbl').textContent=MN[cmo]+' '+cy;
  document.getElementById('weekdays').innerHTML=['L','M','X','J','V','S','D'].map(d=>'<div class="wday">'+d+'</div>').join('');
  const f=new Date(cy,cmo,1).getDay(),off=f===0?6:f-1,dim=new Date(cy,cmo+1,0).getDate(),td=new Date();
  const esHoy=(d)=>td.getFullYear()===cy&&td.getMonth()===cmo&&td.getDate()===d;
  let h=Array(off).fill('<div class="day empty"></div>').join('');
  for(let d=1;d<=dim;d++){
    const items=fcd(cy,cmo,d);
    const isToday=esHoy(d);
    const isSel=sel===d;
    // Dots únicos por tipo
    const tipos=[...new Set(items.map(x=>x.tipo==='tarea'?'t':x.a?'p':'e'))];
    const dots=tipos.map(t=>'<div class="dot '+t+'"></div>').join('');
    const cls=['day','active',(isToday?'today':''),(isSel?'selected':'')].filter(Boolean).join(' ');
    h+='<div class="'+cls+'" onclick="sd('+d+')">'
      +'<span>'+d+'</span>'
      +(dots?'<div class="dot-row">'+dots+'</div>':'')
      +'</div>';
  }
  document.getElementById('cgrid').innerHTML=h;
}

function sd(d){
  sel=d;
  renderCal();
  const dm=fd(cy,cmo,d),dta=fdt(cy,cmo,d);
  const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const total=dm.length+dta.length;
  if(!total){
    const p=document.getElementById('panel');
    p.style.display='none';p.innerHTML='';
    return;
  }
  const mrows=dm.map(m=>{
    const h=new Date(m.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    const ini=m.destinatario_nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const isE=exp.has(m.id);
    return '<div class="msg-row"><div class="av">'+ini+'</div><div class="msg-body">'
      +'<div class="msg-top"><span class="msg-name">'+m.destinatario_nombre+'</span><span class="badge '+(m.activo?'p':'e')+'">'+(m.activo?'pendiente':'enviado')+'</span></div>'
      +'<div class="msg-time">'+h+' · '+m.destinatario_numero+'</div>'
      +'<div class="msg-text" id="px-'+m.id+'" style="'+(isE?'display:none':'')+'">'+renderMsgPreview(m.mensaje)+'</div>'
      +'<div class="msg-textf" id="fx-'+m.id+'" style="'+(isE?'display:block':'display:none')+'">'+renderMsgFull(m.mensaje)+'</div>'
      +'<div class="msg-actions"><button class="act-btn" onclick="te(\''+m.id+'\')">'+(isE?'Ver menos':'Ver más')+'</button></div>'
      +'</div></div>';
  }).join('');
  const trows=dta.map(t=>{
    const h=new Date(t.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    const ini=(t.destinatario_nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return '<div class="msg-row"><div class="av t">'+ini+'</div><div class="msg-body">'
      +'<div class="msg-top"><span class="msg-name">'+t.destinatario_nombre+'</span><span class="badge t">tarea</span></div>'
      +'<div class="msg-time">'+h+' · '+(t.nombre||'')+'</div>'
      +'<div class="msg-text">'+(t.descripcion||'').replace(/\n/g,' ')+'</div>'
      +'</div></div>';
  }).join('');
  const panel=document.getElementById('panel');
  panel.style.display='block';
  panel.innerHTML='<div class="panel-header"><div class="panel-title">'+d+' '+MS[cmo]+' · '+total+' elemento'+(total!==1?'s':'')+'</div>'
    +'<button class="panel-close" onclick="cp()">×</button></div>'+mrows+trows;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function te(id){exp.has(id)?exp.delete(id):exp.add(id);if(sel)sd(sel);}
function cp(){sel=null;const p=document.getElementById('panel');p.style.display='none';p.innerHTML='';renderCal();}
function cm(dir){cmo+=dir;if(cmo>11){cmo=0;cy++;}if(cmo<0){cmo=11;cy--;}sel=null;cp();}

// AUTOCOMPLETE
async function buscarContacto(q){
  const drop=document.getElementById('ac-drop');
  document.getElementById('fnum').value='';
  if(q.length<2){drop.style.display='none';return;}
  clearTimeout(acTimer);
  acTimer=setTimeout(async()=>{
    drop.style.display='block';
    drop.innerHTML='<div class="ac-empty">Buscando...</div>';
    try{
      const res=await fetch(SB_URL+'/functions/v1/search-contacts',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({query:q})
      });
      const data=await res.json();
      if(!data.length){drop.innerHTML='<div class="ac-empty">Sin resultados</div>';return;}
      drop.innerHTML=data.map(c=>{
        const ini=c.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
        const foto=c.foto?'<img src="'+c.foto+'" onerror="this.style.display=\'none\'">':'';
        return '<div class="ac-item" onclick="seleccionarContacto(\''+c.nombre.replace(/'/g,"\\'")+"','"+c.numero+"')\"><div class=\"ac-av\">"+foto+'<span style="'+(c.foto?'display:none':'')+'">'+ini+'</span></div><div><div class="ac-name">'+c.nombre+'</div><div class="ac-num">+'+c.numero+'</div></div></div>';
      }).join('');
    }catch(e){drop.innerHTML='<div class="ac-empty">Error al buscar</div>';}
  },300);
}

function seleccionarContacto(nombre,numero){
  document.getElementById('fn').value=nombre;
  document.getElementById('fnum').value=numero;
  document.getElementById('ac-drop').style.display='none';
  const fnum=document.getElementById('fnum');
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
}

function activarManual(){
  const fn=document.getElementById('fn');
  const fnum=document.getElementById('fnum');
  fn.oninput=null;fn.placeholder='Nombre completo';
  document.getElementById('ac-drop').style.display='none';
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
  fnum.placeholder='Ej: 5493434512214';fnum.value='';
  fnum.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'');};
  document.getElementById('btn-manual').style.display='none';
  const label=document.querySelector('#fnum-wrap label');
  const btnV=document.createElement('button');
  btnV.type='button';btnV.textContent='Buscador';
  btnV.style='font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--teal);cursor:pointer';
  btnV.onclick=()=>resetFormulario();
  label.appendChild(btnV);
}

function resetFormulario(){
  const fn=document.getElementById('fn');
  fn.oninput=function(){buscarContacto(this.value);};
  fn.placeholder='Escribí el nombre...';fn.value='';
  const fnum=document.getElementById('fnum');
  fnum.readOnly=true;fnum.oninput=null;
  fnum.style.background='var(--surf)';fnum.style.color='var(--muted)';
  fnum.placeholder='Se completa automáticamente';fnum.value='';
  document.getElementById('btn-manual').style.display='';
  const btnV=document.querySelector('#fnum-wrap label button:last-child');
  if(btnV&&btnV.textContent==='Buscador')btnV.remove();
}

function openModal(){
  resetFormulario();
  document.getElementById('fmsg').value='';
  const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  document.getElementById('fdt').value=now.toISOString().slice(0,16);
  document.getElementById('mwrap').style.display='flex';
}
function closeModal(){document.getElementById('mwrap').style.display='none';document.getElementById('ac-drop').style.display='none';}

async function guardar(){
  const n=document.getElementById('fn').value.trim();
  const num=document.getElementById('fnum').value.trim().replace(/\D/g,'');
  const msg=document.getElementById('fmsg').value.trim();
  const dt=document.getElementById('fdt').value;
  if(!n||!num||!msg||!dt){showToast('Completá todos los campos','err');return;}
  const btn=document.getElementById('bsv');btn.disabled=true;btn.textContent='Guardando...';
  const {error}=await db.from('mensajes_programados').insert({
    destinatario_nombre:n,destinatario_numero:num,mensaje:msg,
    cron_expresion:'* * * * *',una_sola_vez:true,
    proximo_envio:new Date(dt).toISOString(),activo:true
  });
  btn.disabled=false;btn.textContent='Guardar';
  if(error){showToast('Error: '+error.message,'err');return;}
  showToast('Mensaje programado!','ok');closeModal();await load();
}

function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.getElementById('ac-drop').style.display='none';});
document.getElementById('mwrap').addEventListener('click',e=>{if(e.target===document.getElementById('mwrap'))closeModal();});

// RENDER MENSAJE CON PREVIEW DE IMAGEN
function extractImageUrl(text) {
  const match = text.match(/https?:\/\/[^\s]+(\.(jpg|jpeg|png|gif|webp)|storage\/v1\/object\/pub[^\s]*)/i);
  return match ? match[0] : null;
}

function renderMsgPreview(texto) {
  const url = extractImageUrl(texto);
  if (url) {
    const sinUrl = texto.replace(url, '').trim();
    const preview = '<div style="margin-top:4px">'
      + '<img src="'+url+'" style="width:100%;max-width:120px;height:70px;object-fit:cover;display:block;border-radius:8px" onerror="this.parentNode.style.display=\'none\'">'
      + '</div>';
    return (sinUrl ? sinUrl.replace(/\n/g,' ').slice(0,60) : '') + preview;
  }
  return texto.replace(/\n/g,' ');
}

function renderMsgFull(texto) {
  const url = extractImageUrl(texto);
  if (url) {
    const sinUrl = texto.replace(url, '').trim();
    return '<img src="'+url+'" style="width:100%;max-width:260px;border-radius:10px;margin-bottom:6px;display:block" onerror="this.style.display=\'none\'">'
      + (sinUrl ? sinUrl : '');
  }
  return texto;
}

  document.body.classList.toggle('light',light);
  document.getElementById('theme-icon').textContent=light?'🌙':'☀️';
  document.getElementById('theme-label').textContent=light?'Oscuro':'Claro';

function toggleTheme(){setTheme(!document.body.classList.contains('light'));}
setTheme(localStorage.getItem('theme')==='light');

// NOTIFICACIONES
function urlBase64ToUint8Array(s){
  const b64=s.replace(/-/g,'+').replace(/_/g,'/');
  const pad='='.repeat((4-b64.length%4)%4);
  return Uint8Array.from(atob(b64+pad),c=>c.charCodeAt(0));
}

async function activarNotifs(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('Browser no soportado','err');return;}
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){showToast('Permiso denegado','err');return;}
  try{
    const reg=await navigator.serviceWorker.register('/sw.js',{scope:'/'});
    await Promise.race([navigator.serviceWorker.ready,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))]);
    let sub=await reg.pushManager.getSubscription();
    if(!sub){sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_KEY)});}
    const j=sub.toJSON();
    if(!j.keys)throw new Error('Sin claves');
    const{error}=await db.from('push_subscriptions').upsert({endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,user_agent:navigator.userAgent.slice(0,200),activo:true},{onConflict:'endpoint'});
    if(error)throw new Error(error.message);
    document.getElementById('notif-btn').style.borderColor='var(--teal)';
    showToast('Notificaciones activadas!','ok');
  }catch(e){showToast('Error: '+e.message,'err');}
}

async function verificarNotifs(){
  if(!('serviceWorker' in navigator))return;
  const reg=await navigator.serviceWorker.getRegistration('/sw.js').catch(()=>null);
  if(!reg)return;
  const sub=await reg.pushManager.getSubscription().catch(()=>null);
  if(sub)document.getElementById('notif-btn').style.borderColor='var(--teal)';
}

load();
setInterval(load,60000);
verificarNotifs();
</script>
