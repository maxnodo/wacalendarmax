<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calendario WA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Calendario WhatsApp — OtroNodo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#13172a;--card:#1e2338;--surf:#242938;--brd:rgba(255,255,255,0.07);
  --text:#fff;--muted:#6b7280;--teal:#2dd4b0;--teal-bg:rgba(45,212,176,0.12);
  --amber:#fbbf24;--purple:#a78bfa;--sel-bg:#2dd4b0;
}
body.light{
  --bg:#f0f4f8;--card:#fff;--surf:#f8fafc;--brd:rgba(0,0,0,0.07);
  --text:#0f172a;--muted:#94a3b8;--teal:#0d9488;--teal-bg:rgba(13,148,136,0.08);
  --amber:#d97706;--purple:#7c3aed;--sel-bg:#0d9488;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOP */
.top{background:var(--card);border-bottom:1px solid var(--brd);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:99}
.brand{font-size:15px;font-weight:700;color:var(--teal)}
.top-right{display:flex;align-items:center;gap:8px}
.upd{font-size:11px;color:var(--muted)}
.icon-btn{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:4px}
.icon-btn:hover{border-color:var(--teal)}
.icon-btn span{font-size:11px;color:var(--muted)}

.main{max-width:480px;margin:0 auto;padding:1rem}

/* WEEK STRIP */
.cal{background:var(--card);border-radius:20px;padding:1rem 1.25rem;margin-bottom:1rem;position:relative}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.cal-month{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.cal-month-arrow{font-size:11px;color:var(--muted);transition:transform .2s}
.cal-nav{display:flex;gap:6px;align-items:center}
.nav-btn{width:32px;height:32px;border-radius:10px;background:var(--surf);border:1px solid var(--brd);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--teal);color:var(--teal)}
.today-btn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;background:var(--teal-bg);border:1px solid rgba(45,212,176,0.25);color:var(--teal);cursor:pointer}

.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ws-day{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:14px;cursor:pointer;transition:background .15s}
.ws-day:hover{background:var(--teal-bg)}
.ws-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.ws-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:var(--muted);transition:all .15s}
.ws-day.has-events .ws-num{color:var(--text);font-weight:600}
.ws-day.today .ws-num{color:var(--teal);font-weight:700;border:2px solid var(--teal)}
.ws-day.selected .ws-num{background:var(--sel-bg);color:#fff!important;font-weight:700;border:none}
body.light .ws-day.selected .ws-num{color:#0f172a!important}
.ws-dots{display:flex;gap:2px;justify-content:center;min-height:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%}
.dot.e{background:var(--teal)}.dot.p{background:var(--amber)}.dot.t{background:var(--purple)}

/* MONTH PICKER */
.month-picker{display:none;position:absolute;top:60px;left:12px;right:12px;background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:.875rem;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.month-picker.open{display:block}
.mp-year{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.mp-yr{font-size:14px;font-weight:700;color:var(--text)}
.mp-yr-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:6px}
.mp-yr-btn:hover{color:var(--text);background:var(--surf)}
.mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.mp-month{padding:7px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);border-radius:8px;cursor:pointer;transition:all .15s}
.mp-month:hover{background:var(--teal-bg);color:var(--teal)}
.mp-month.active{background:var(--teal);color:#fff;font-weight:700}
body.light .mp-month.active{color:#0f172a}

/* BOTÓN NUEVO */
.btn-new{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:opacity .15s;margin-bottom:1rem}
body.light .btn-new{color:#0f172a}
.btn-new:hover{opacity:.85}

/* TIMELINE */
.timeline-wrap{background:var(--card);border-radius:20px;overflow:hidden;margin-bottom:1rem}
.timeline-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--brd)}
.timeline-title{font-size:13px;font-weight:600;color:var(--text)}
.timeline-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.timeline-close:hover{background:var(--surf)}
.timeline-body{padding:.75rem 1rem 1rem;overflow:hidden}
.timeline-empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}

/* SLOT DE HORA */
.tl-slot{display:flex;gap:10px;min-height:60px;position:relative;min-width:0}
.tl-hour{width:42px;flex-shrink:0;font-size:10px;font-weight:600;color:var(--muted);padding-top:4px;text-align:right;white-space:nowrap}
.tl-line-col{width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;position:relative}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--brd);border:2px solid var(--brd);flex-shrink:0;margin-top:6px;z-index:1;transition:all .2s}
.tl-slot.has-msg .tl-dot{background:var(--teal);border-color:var(--teal)}
.tl-line{flex:1;width:2px;background:var(--brd)}
.tl-slot:last-child .tl-line{display:none}
.tl-content{flex:1;padding-bottom:.75rem;min-width:0;overflow:hidden}

/* GAP separador */
.tl-gap{display:flex;justify-content:center;padding:.375rem 0;margin:.125rem 0}
.tl-gap-line{display:none}
.tl-gap-label{font-size:10px;font-weight:600;color:var(--teal);padding:4px 14px;border-radius:20px;background:var(--teal-bg);border:1px solid rgba(45,212,176,0.2);letter-spacing:.03em}

/* NOW indicator */
.tl-slot.now-slot .tl-dot{background:#f87171;border-color:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,0.25)}
.tl-slot.now-slot .tl-hour{color:#f87171}

/* TARJETAS TIMELINE */
.tl-card{border-radius:14px;padding:.75rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative;overflow:hidden;width:100%;box-sizing:border-box}
.tl-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.tl-card-name{font-size:14px;font-weight:700;color:#1a1f2e;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-card-msg{font-size:11px;color:rgba(26,31,46,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;max-width:100%}
.tl-card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.tl-card-time{font-size:10px;font-weight:600;color:rgba(26,31,46,0.5);display:flex;align-items:center;gap:4px}
.tl-card-actions{display:flex;gap:5px;flex-shrink:0}
.tl-card-btn{font-size:9px;padding:2px 8px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:rgba(0,0,0,0.06);color:rgba(26,31,46,0.6);cursor:pointer;transition:all .15s;white-space:nowrap}
.tl-card-btn:hover{background:rgba(0,0,0,0.12);color:#1a1f2e}
.tl-card-btn.del:hover{border-color:rgba(220,38,38,0.4);background:rgba(220,38,38,0.1);color:#dc2626}
.tl-card-expanded{display:none;font-size:11px;color:rgba(26,31,46,0.7);margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,0.1);white-space:pre-wrap;line-height:1.5;word-break:break-word}
.tl-card-img{width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:6px;display:block}

/* Tarjeta enviada — más apagada */
.tl-card.sent{opacity:0.65;filter:grayscale(20%)}
.tl-card.sent .tl-card-name{opacity:.8}

/* Paleta pastel para tarjetas */
.tc-purple{background:#D4C5F0}
.tc-blue{background:#BED3F0}
.tc-green{background:#C2E0CA}
.tc-peach{background:#F0D0C0}
.tc-sand{background:#EDE0C4}
.tc-sky{background:#C0DAE8}

/* PAGINACIÓN */
.pag-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-top:1px solid var(--brd)}
.pag-btn{font-size:11px;padding:5px 14px;border-radius:8px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.pag-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.pag-btn:disabled{opacity:.3;cursor:not-allowed}
.pag-info{font-size:11px;color:var(--muted)}

/* MODAL */
.modal-wrap{display:none;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;background:rgba(0,0,0,.65);position:fixed;inset:0;z-index:200;overflow-y:auto}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:440px;padding:1.5rem}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.fr{margin-bottom:12px;position:relative}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fr input,.fr textarea{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--text);font-size:13px;padding:10px 14px;outline:none;font-family:inherit;transition:border-color .15s}
.fr input:focus,.fr textarea:focus{border-color:var(--teal)}
.fr textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{background:var(--surf);border:1px solid var(--brd);border-radius:12px;color:var(--muted);font-size:13px;padding:10px 18px;cursor:pointer}
.btn-save{background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer}
body.light .btn-save{color:#0f172a}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* ADJUNTO */
.attach-zone{border:2px dashed var(--brd);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
.attach-zone:hover{border-color:var(--teal)}
.attach-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.az-icon{font-size:24px;margin-bottom:4px}
.az-label{font-size:12px;color:var(--muted)}
.az-types{font-size:10px;color:var(--muted);margin-top:2px;opacity:.7}
.attach-preview{display:none;border-radius:12px;overflow:hidden;border:1px solid var(--brd);margin-top:6px}
.attach-preview img{width:100%;max-height:140px;object-fit:cover;display:block}
.ap-info{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--surf)}
.ap-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ap-size{font-size:10px;color:var(--muted)}
.ap-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.attach-progress{display:none;margin-top:6px}
.ap-bar{height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.ap-fill{height:100%;background:var(--teal);width:0%;transition:width .2s;border-radius:2px}
.ap-text{font-size:10px;color:var(--muted);text-align:center;margin-top:3px}

/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--brd);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:100;max-height:220px;overflow-y:auto;display:none;margin-top:4px}
.ac-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--surf)}
.ac-av{width:32px;height:32px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--teal);flex-shrink:0;overflow:hidden}
.ac-av img{width:100%;height:100%;object-fit:cover}
.ac-name{font-size:12px;font-weight:600;color:var(--text)}
.ac-num{font-size:10px;color:var(--muted)}
.ac-empty{padding:12px 14px;font-size:12px;color:var(--muted);text-align:center}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px 20px;font-size:13px;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.ok{border-color:rgba(45,212,176,.4);color:var(--teal)}
.toast.err{border-color:rgba(248,113,113,.4);color:#f87171}
</style>
</head>
<body>
<div class="top">
  <div class="brand">OtroNodo · WhatsApp</div>
  <div class="top-right">
    <div class="upd" id="upd"></div>
    <button class="icon-btn" onclick="activarNotifs()" id="notif-btn">🔔</button>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">
      <span id="theme-icon">☀️</span><span id="theme-label">Claro</span>
    </button>
  </div>
</div>

<div class="main">
  <!-- WEEK STRIP -->
  <div class="cal">
    <div class="cal-header">
      <div class="cal-month" onclick="toggleMonthPicker()">
        <span id="mlbl-text"></span>
        <span class="cal-month-arrow" id="mp-arrow">▾</span>
      </div>
      <div class="cal-nav">
        <button class="today-btn" onclick="goToday()">Hoy</button>
        <button class="nav-btn" onclick="cw(-1)">&#8249;</button>
        <button class="nav-btn" onclick="cw(1)">&#8250;</button>
      </div>
    </div>
    <div class="week-strip" id="week-strip"></div>
    <div class="month-picker" id="month-picker">
      <div class="mp-year">
        <button class="mp-yr-btn" onclick="changeYear(-1)">&#8249;</button>
        <span class="mp-yr" id="mp-yr"></span>
        <button class="mp-yr-btn" onclick="changeYear(1)">&#8250;</button>
      </div>
      <div class="mp-grid" id="mp-grid"></div>
    </div>
  </div>

  <button class="btn-new" onclick="openModal()">+ Nuevo mensaje</button>

  <!-- TIMELINE -->
  <div id="timeline-wrap" style="display:none" class="timeline-wrap"></div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="mwrap">
  <div class="modal">
    <div class="modal-title">Nuevo mensaje programado</div>
    <div class="fr">
      <label>Destinatario</label>
      <div class="ac-wrap">
        <input id="fn" placeholder="Escribí el nombre..." autocomplete="off" oninput="buscarContacto(this.value)">
        <div class="ac-drop" id="ac-drop"></div>
      </div>
    </div>
    <div class="fr" id="fnum-wrap">
      <label style="display:flex;align-items:center;justify-content:space-between">
        <span>Número</span>
        <button type="button" id="btn-manual" onclick="activarManual()" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--muted);cursor:pointer">Manual</button>
      </label>
      <input id="fnum" placeholder="Se completa automáticamente" readonly style="background:var(--surf);color:var(--muted)">
    </div>
    <div class="fr">
      <label>Adjunto (opcional)</label>
      <div class="attach-zone" id="attach-zone">
        <input type="file" id="ffile" accept="image/*,video/*,.pdf,.doc,.docx" onchange="onFileSelect(this)">
        <div class="az-icon">📎</div>
        <div class="az-label">Tocá para adjuntar</div>
        <div class="az-types">Imágenes · Videos · PDF · Word</div>
      </div>
      <div class="attach-preview" id="attach-preview">
        <img id="ap-img" src="" alt="" style="display:none">
        <div class="ap-info">
          <span class="ap-name" id="ap-name"></span>
          <span class="ap-size" id="ap-size"></span>
          <button class="ap-remove" onclick="removeFile()" type="button">×</button>
        </div>
      </div>
      <div class="attach-progress" id="attach-progress">
        <div class="ap-bar"><div class="ap-fill" id="ap-fill"></div></div>
        <div class="ap-text" id="ap-text">Subiendo...</div>
      </div>
    </div>
    <div class="fr"><label>Mensaje</label><textarea id="fmsg" placeholder="Escribí el mensaje... (opcional si hay adjunto)"></textarea></div>
    <div class="fr"><label>Fecha y hora (Madrid)</label><input type="datetime-local" id="fdt"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="bsv" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://azmurvcoiqbktxmevsga.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6bXVydmNvaXFia3R4bWV2c2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxMzk4MTUsImV4cCI6MjA2MDcxNTgxNX0.ZOK2jmI2v0o16A_qdxe8iy5rn5xATkOboGSC6r6zU2Y';
const VAPID_KEY='BG4ENwYYyhvwV2Gy7DJQr16aYLmBvlzRxoxez1lbxO0Jd7_JLNx1aCxmRJ2eLCEZWMhR3ZTkHZ7UwXIOyfRUP1U';
const db=supabase.createClient(SB_URL,SB_KEY);

const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MNC=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const WD=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const TC=['tc-purple','tc-blue','tc-green','tc-peach','tc-sand','tc-sky'];

let msgs=[],tareas=[],calData=[],cwd=new Date(),sel=null,exp=new Set(),acTimer=null;

function getMondayOf(date){
  var d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;
}
function getCardColor(str){var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return TC[Math.abs(h)%TC.length];}
function extractImageUrl(text){var m=text.match(/https?:\/\/[^\s]+(\.(?:jpg|jpeg|png|gif|webp)|storage\/v1\/object\/pub[^\s]*)/i);return m?m[0]:null;}

async function load(){
  var r=await Promise.all([
    db.from('mensajes_programados').select('id,destinatario_nombre,destinatario_numero,mensaje,proximo_envio,activo').order('proximo_envio'),
    db.from('tareas_dinamicas').select('id,nombre,descripcion,destinatario_nombre,destinatario_numero,proximo_envio,activo').order('proximo_envio'),
    db.from('v_calendario').select('*')
  ]);
  if(r[0].data) msgs=r[0].data;
  if(r[1].data) tareas=r[1].data;
  if(r[2].data) calData=r[2].data;
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  renderWeek();
  if(sel) renderTimeline(sel);
}

function fcd(y,m,d){return calData.filter(function(x){return x.y===y&&x.m===m&&x.d===d;});}
function fd(y,m,d){return msgs.filter(function(x){var dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}
function fdt(y,m,d){return tareas.filter(function(x){var dt=new Date(x.proximo_envio);return dt.getUTCFullYear()===y&&dt.getUTCMonth()===m&&dt.getUTCDate()===d;});}

// WEEK STRIP
function renderWeek(){
  var monday=getMondayOf(cwd),today=new Date();
  var mid=new Date(monday);mid.setDate(mid.getDate()+3);
  document.getElementById('mlbl-text').textContent=MN[mid.getMonth()]+' '+mid.getFullYear();
  var html='';
  for(var i=0;i<7;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
    var isSel=sel&&sel.getFullYear()===y&&sel.getMonth()===m&&sel.getDate()===day;
    var items=fcd(y,m,day);
    var tipos=[];items.forEach(function(x){var t=x.tipo==='tarea'?'t':x.a?'p':'e';if(tipos.indexOf(t)<0)tipos.push(t);});
    var dots=tipos.map(function(t){return '<div class="dot '+t+'"></div>';}).join('');
    var cls='ws-day'+(items.length?' has-events':'')+(isToday?' today':'')+(isSel?' selected':'');
    html+='<div class="'+cls+'" onclick="sd(new Date('+y+','+m+','+day+'))">'
      +'<div class="ws-label">'+WD[d.getDay()]+'</div>'
      +'<div class="ws-num">'+day+'</div>'
      +'<div class="ws-dots">'+dots+'</div>'
      +'</div>';
  }
  document.getElementById('week-strip').innerHTML=html;
}

function cw(dir){cwd=new Date(cwd);cwd.setDate(cwd.getDate()+dir*7);renderWeek();}
function goToday(){cwd=new Date();sel=new Date();renderWeek();renderTimeline(new Date());}

// MONTH PICKER
var mpOpen=false,mpYear=new Date().getFullYear();
function toggleMonthPicker(){
  mpOpen=!mpOpen;
  var mid=new Date(getMondayOf(cwd));mid.setDate(mid.getDate()+3);
  mpYear=mid.getFullYear();
  document.getElementById('month-picker').classList.toggle('open',mpOpen);
  document.getElementById('mp-arrow').style.transform=mpOpen?'rotate(180deg)':'';
  if(mpOpen)renderMonthPicker();
}
function renderMonthPicker(){
  document.getElementById('mp-yr').textContent=mpYear;
  var mid=new Date(getMondayOf(cwd));mid.setDate(mid.getDate()+3);
  var curMo=mid.getMonth(),curYr=mid.getFullYear();
  document.getElementById('mp-grid').innerHTML=MNC.map(function(m,i){
    return '<div class="mp-month'+(i===curMo&&mpYear===curYr?' active':'')+'" onclick="selectMonth('+i+')">'+m+'</div>';
  }).join('');
}
function changeYear(dir){mpYear+=dir;renderMonthPicker();}
function selectMonth(m){
  cwd=new Date(mpYear,m,1);sel=null;mpOpen=false;
  document.getElementById('month-picker').classList.remove('open');
  document.getElementById('mp-arrow').style.transform='';
  document.getElementById('timeline-wrap').style.display='none';
  renderWeek();
}

// TIMELINE
function sd(dateObj){
  sel=dateObj;cwd=new Date(dateObj);
  renderWeek();
  renderTimeline(dateObj);
  setTimeout(function(){document.getElementById('timeline-wrap').scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}

function renderTimeline(dateObj){
  var y=dateObj.getFullYear(),m=dateObj.getMonth(),d=dateObj.getDate();
  var dm=fd(y,m,d),dta=fdt(y,m,d);
  var all=dm.map(function(x){return Object.assign({},x,{_t:'msg'});}).concat(
    dta.map(function(x){return Object.assign({},x,{_t:'tarea'});})
  );
  all.sort(function(a,b){return new Date(a.proximo_envio)-new Date(b.proximo_envio);});

  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var wrap=document.getElementById('timeline-wrap');
  wrap.style.display='block';

  if(!all.length){
    wrap.innerHTML='<div class="timeline-header"><div class="timeline-title">'+d+' '+MS[m]+'</div>'
      +'<button class="timeline-close" onclick="cp()">×</button></div>'
      +'<div class="timeline-empty">Sin mensajes programados este día</div>';
    return;
  }

  // Solo horas con mensajes + hora actual si es hoy
  var now=new Date();
  var isToday=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
  var msgsByHour={};
  all.forEach(function(x){
    var dt=new Date(x.proximo_envio);
    var hStr=dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
    var hNum=parseInt(hStr.split(':')[0]);
    if(!msgsByHour[hNum]) msgsByHour[hNum]=[];
    msgsByHour[hNum].push(x);
  });
  var hoursWithMsgs=Object.keys(msgsByHour).map(Number).sort(function(a,b){return a-b;});
  var slotsToShow=hoursWithMsgs.slice();
  if(isToday && slotsToShow.indexOf(now.getHours())<0) slotsToShow.push(now.getHours());
  slotsToShow.sort(function(a,b){return a-b;});

  var slots='';
  for(var si=0;si<slotsToShow.length;si++){
    var h=slotsToShow[si];
    if(si>0 && h-slotsToShow[si-1]>1){
      var gap=h-slotsToShow[si-1]-1;
      slots+='<div class="tl-gap">'
        +'<div class="tl-gap-line"></div>'
        +'<div class="tl-gap-label">+'+gap+'h</div>'
        +'<div class="tl-gap-line"></div>'
        +'</div>';
    }
    var hLabel=(h<10?'0':'')+h+':00';
    var hasMsg=!!msgsByHour[h];
    var isNow=isToday&&now.getHours()===h;
    var cls='tl-slot'+(hasMsg?' has-msg':'')+(isNow?' now-slot':'');
    var cards='';
    if(msgsByHour[h]){
      msgsByHour[h].forEach(function(x){
        var hStr=new Date(x.proximo_envio).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
        var cc=getCardColor(x.destinatario_numero||x.destinatario_nombre);
        var isSent=x._t==='msg'&&!x.activo;
        var isE=exp.has(x.id);
        var statusIcon=x._t==='tarea'?'🔄':(x.activo?'⏱':'✓');
        var imgUrl=x.mensaje?extractImageUrl(x.mensaje):null;
        var msgText=x._t==='tarea'?(x.descripcion||x.nombre||''):(x.mensaje||'');
        if(imgUrl) msgText=msgText.replace(imgUrl,'').trim();
        cards+='<div class="tl-card '+cc+(isSent?' sent':'')+'" id="tc-'+x.id+'">'
          +'<div class="tl-card-name">'+x.destinatario_nombre+'</div>'
          +(msgText?'<div class="tl-card-msg">'+msgText.replace(/\n/g,' ')+'</div>':'')
          +'<div class="tl-card-footer">'
            +'<div class="tl-card-time">'+statusIcon+' '+hStr+'</div>'
            +'<div class="tl-card-actions">'
              +'<button class="tl-card-btn" onclick="toggleCard(\''+x.id+'\')">'+(isE?'− menos':'+ más')+'</button>'
              +(x._t==='msg'&&x.activo?'<button class="tl-card-btn del" onclick="eliminar(\''+x.id+'\',\''+x.destinatario_nombre.replace(/'/g,"&#39;")+'\',event)">🗑</button>':'')
            +'</div>'
          +'</div>'
          +'<div class="tl-card-expanded" id="tce-'+x.id+'" style="display:'+(isE?'block':'none')+';">'
            +(imgUrl?'<img class="tl-card-img" src="'+imgUrl+'" onerror="this.style.display=\'none\'">':'')
            +(msgText||'')
          +'</div>'
          +'</div>';
      });
    }
    slots+='<div class="'+cls+'">'
      +'<div class="tl-hour">'+hLabel+'</div>'
      +'<div class="tl-line-col"><div class="tl-dot"></div><div class="tl-line"></div></div>'
      +'<div class="tl-content">'+cards+'</div>'
      +'</div>';
  }

  wrap.innerHTML='<div class="timeline-header">'
    +'<div class="timeline-title">'+d+' de '+MS[m]+' · '+all.length+' mensaje'+(all.length!==1?'s':'')+'</div>'
    +'<button class="timeline-close" onclick="cp()">×</button>'
    +'</div>'
    +'<div class="timeline-body">'+slots+'</div>';
}

function toggleCard(id){
  if(exp.has(id))exp.delete(id);else exp.add(id);
  if(sel) renderTimeline(sel);
}

function cp(){
  sel=null;
  document.getElementById('timeline-wrap').style.display='none';
  renderWeek();
}

// ELIMINAR
async function eliminar(id,nombre,e){
  e.stopPropagation();
  if(!confirm('¿Eliminar el mensaje para '+nombre+'?')) return;
  var res=await db.from('mensajes_programados').delete().eq('id',id);
  if(res.error){showToast('Error al eliminar','err');return;}
  showToast('Mensaje eliminado','ok');
  await load();
}

// AUTOCOMPLETE
async function buscarContacto(q){
  var drop=document.getElementById('ac-drop');
  document.getElementById('fnum').value='';
  if(q.length<2){drop.style.display='none';return;}
  clearTimeout(acTimer);
  acTimer=setTimeout(async function(){
    drop.style.display='block';
    drop.innerHTML='<div class="ac-empty">Buscando...</div>';
    try{
      var res=await fetch(SB_URL+'/functions/v1/search-contacts',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({query:q})
      });
      var data=await res.json();
      if(!data.length){drop.innerHTML='<div class="ac-empty">Sin resultados</div>';return;}
      drop.innerHTML=data.map(function(c){
        var ini=c.nombre.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
        var foto=c.foto?'<img src="'+c.foto+'" onerror="this.style.display=\'none\'">':'';
        return '<div class="ac-item" onclick="seleccionarContacto(\''+c.nombre.replace(/'/g,"&#39;")+"','"+c.numero+"')\"><div class=\"ac-av\">"+foto+'<span style="'+(c.foto?'display:none':'')+'">'+ini+'</span></div><div><div class="ac-name">'+c.nombre+'</div><div class="ac-num">+'+c.numero+'</div></div></div>';
      }).join('');
    }catch(e){drop.innerHTML='<div class="ac-empty">Error al buscar</div>';}
  },300);
}
function seleccionarContacto(nombre,numero){
  document.getElementById('fn').value=nombre;
  document.getElementById('fnum').value=numero;
  document.getElementById('ac-drop').style.display='none';
  var fnum=document.getElementById('fnum');
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
}
function activarManual(){
  var fn=document.getElementById('fn'),fnum=document.getElementById('fnum');
  fn.oninput=null;fn.placeholder='Nombre completo';
  document.getElementById('ac-drop').style.display='none';
  fnum.readOnly=false;fnum.style.background='';fnum.style.color='';
  fnum.placeholder='Ej: 5493434512214';fnum.value='';
  fnum.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'');};
  document.getElementById('btn-manual').style.display='none';
  var label=document.querySelector('#fnum-wrap label');
  var btnV=document.createElement('button');
  btnV.type='button';btnV.textContent='Buscador';
  btnV.style='font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--teal);cursor:pointer';
  btnV.onclick=function(){resetFormulario();};
  label.appendChild(btnV);
}
function resetFormulario(){
  var fn=document.getElementById('fn');
  fn.oninput=function(){buscarContacto(this.value);};
  fn.placeholder='Escribí el nombre...';fn.value='';
  var fnum=document.getElementById('fnum');
  fnum.readOnly=true;fnum.oninput=null;
  fnum.style.background='var(--surf)';fnum.style.color='var(--muted)';
  fnum.placeholder='Se completa automáticamente';fnum.value='';
  document.getElementById('btn-manual').style.display='';
  var btnV=document.querySelector('#fnum-wrap label button:last-child');
  if(btnV&&btnV.textContent==='Buscador') btnV.remove();
}

// ADJUNTO
var selectedFile=null,uploadedUrl=null;
function onFileSelect(input){
  var file=input.files[0];if(!file)return;
  selectedFile=file;uploadedUrl=null;
  var img=document.getElementById('ap-img');
  document.getElementById('ap-name').textContent=file.name;
  document.getElementById('ap-size').textContent=formatSize(file.size);
  if(file.type.startsWith('image/')){var reader=new FileReader();reader.onload=function(e){img.src=e.target.result;img.style.display='block';};reader.readAsDataURL(file);}
  else{img.style.display='none';}
  document.getElementById('attach-preview').style.display='block';
  document.getElementById('attach-zone').style.display='none';
}
function removeFile(){
  selectedFile=null;uploadedUrl=null;
  document.getElementById('ffile').value='';
  document.getElementById('attach-preview').style.display='none';
  document.getElementById('attach-zone').style.display='block';
  document.getElementById('attach-progress').style.display='none';
  document.getElementById('ap-fill').style.width='0%';
}
function formatSize(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
async function uploadFile(){
  var progress=document.getElementById('attach-progress'),fill=document.getElementById('ap-fill'),apText=document.getElementById('ap-text');
  progress.style.display='block';fill.style.width='20%';apText.textContent='Subiendo...';
  var fd=new FormData();fd.append('file',selectedFile,selectedFile.name);
  fill.style.width='50%';
  var res=await fetch(SB_URL+'/functions/v1/upload-media',{method:'POST',headers:{'Authorization':'Bearer '+SB_KEY},body:fd});
  var data=await res.json();
  if(!data.ok) throw new Error(data.error||'Error al subir');
  fill.style.width='100%';apText.textContent='✓ Subido';
  return data.url;
}

function openModal(){
  resetFormulario();removeFile();
  document.getElementById('fmsg').value='';
  var now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  var nowStr=now.toISOString().slice(0,16);
  document.getElementById('fdt').value=nowStr;
  document.getElementById('fdt').min=nowStr;
  document.getElementById('mwrap').style.display='flex';
}
function closeModal(){document.getElementById('mwrap').style.display='none';document.getElementById('ac-drop').style.display='none';}

async function guardar(){
  var n=document.getElementById('fn').value.trim();
  var num=document.getElementById('fnum').value.trim().replace(/\D/g,'');
  var msg=document.getElementById('fmsg').value.trim();
  var dt=document.getElementById('fdt').value;
  if(!n||!num||!dt){showToast('Completá destinatario, número y fecha','err');return;}
  if(new Date(dt)<new Date()){showToast('No podés agendar en el pasado','err');return;}
  if(!msg&&!selectedFile){showToast('Escribí un mensaje o adjuntá un archivo','err');return;}
  var btn=document.getElementById('bsv');btn.disabled=true;btn.textContent='Guardando...';
  try{
    var finalMsg=msg;
    if(selectedFile){btn.textContent='Subiendo...';var url=await uploadFile();finalMsg=msg?(msg+'\n'+url):url;}
    var res=await db.from('mensajes_programados').insert({
      destinatario_nombre:n,destinatario_numero:num,mensaje:finalMsg,
      cron_expresion:'* * * * *',una_sola_vez:true,
      proximo_envio:new Date(dt).toISOString(),activo:true
    });
    if(res.error) throw res.error;
    showToast('Mensaje programado!','ok');closeModal();await load();
  }catch(e){showToast('Error: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Guardar';
}

function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}

document.addEventListener('click',function(e){
  if(!e.target.closest('.ac-wrap')) document.getElementById('ac-drop').style.display='none';
  if(mpOpen&&!e.target.closest('.cal')){
    mpOpen=false;
    document.getElementById('month-picker').classList.remove('open');
    document.getElementById('mp-arrow').style.transform='';
  }
});
document.getElementById('mwrap').addEventListener('click',function(e){if(e.target===document.getElementById('mwrap'))closeModal();});

// TEMA
function setTheme(light){
  document.body.classList.toggle('light',light);
  document.getElementById('theme-icon').textContent=light?'🌙':'☀️';
  document.getElementById('theme-label').textContent=light?'Oscuro':'Claro';
  localStorage.setItem('theme',light?'light':'dark');
}
function toggleTheme(){setTheme(!document.body.classList.contains('light'));}
setTheme(localStorage.getItem('theme')==='light');

// NOTIFICACIONES
function urlBase64ToUint8Array(s){
  var b64=s.replace(/-/g,'+').replace(/_/g,'/');
  var pad='='.repeat((4-b64.length%4)%4);
  return Uint8Array.from(atob(b64+pad),function(c){return c.charCodeAt(0);});
}
async function activarNotifs(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('Browser no soportado','err');return;}
  var perm=await Notification.requestPermission();
  if(perm!=='granted'){showToast('Permiso denegado','err');return;}
  try{
    var reg=await navigator.serviceWorker.register('/sw.js',{scope:'/'});
    await Promise.race([navigator.serviceWorker.ready,new Promise(function(_,r){setTimeout(function(){r(new Error('timeout'));},5000);})]);
    var sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_KEY)});
    var j=sub.toJSON();if(!j.keys) throw new Error('Sin claves');
    var res=await db.from('push_subscriptions').upsert({endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,user_agent:navigator.userAgent.slice(0,200),activo:true},{onConflict:'endpoint'});
    if(res.error) throw new Error(res.error.message);
    document.getElementById('notif-btn').style.borderColor='var(--teal)';
    showToast('Notificaciones activadas!','ok');
  }catch(e){showToast('Error: '+e.message,'err');}
}
async function verificarNotifs(){
  if(!('serviceWorker' in navigator)) return;
  var reg=await navigator.serviceWorker.getRegistration('/sw.js').catch(function(){return null;});
  if(!reg) return;
  var sub=await reg.pushManager.getSubscription().catch(function(){return null;});
  if(sub) document.getElementById('notif-btn').style.borderColor='var(--teal)';
}

load();
setInterval(load,60000);
verificarNotifs();
</script>
